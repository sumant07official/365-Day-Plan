<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0d0d14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Discipline">
<link rel="manifest" href="./manifest.json">
<title>365 Discipline</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0d0d14;
  --bg2:      #12121c;
  --surface:  #1a1a2e;
  --surface2: #22223a;
  --surface3: #2a2a45;
  --border:   rgba(139,92,246,0.15);
  --border2:  rgba(139,92,246,0.28);
  --text:     #f0eeff;
  --muted:    #8878aa;
  --muted2:   #443d66;
  --purple:   #8b5cf6;
  --purple2:  #a78bfa;
  --purple3:  #c4b5fd;
  --pink:     #ec4899;
  --cyan:     #06b6d4;
  --green:    #10b981;
  --amber:    #f59e0b;
  --red:      #ef4444;
  --font:     'Space Grotesk', sans-serif;
  --mono:     'JetBrains Mono', monospace;
  --radius:   14px;
  --nb-h:     68px;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

/* ── LAYOUT ── */
#app { display: flex; flex-direction: column; height: 100dvh; height: 100vh; }
#content { flex: 1; overflow-y: auto; overflow-x: hidden; padding-bottom: calc(var(--nb-h) + 12px); scroll-behavior: smooth; }
#content::-webkit-scrollbar { display: none; }

/* ── PAGES ── */
.page { display: none; padding: 20px 16px 0; animation: fadeUp .25s ease; }
.page.active { display: block; }
@keyframes fadeUp { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }

/* ── NAVBAR ── */
#navbar {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: var(--nb-h);
  background: rgba(13,13,20,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-around;
  padding: 0 4px;
  z-index: 100;
  padding-bottom: env(safe-area-inset-bottom);
}
.nb-btn {
  flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
  gap: 4px; padding: 8px 4px; cursor: pointer; border: none; background: none;
  color: var(--muted); transition: color .2s; position: relative;
}
.nb-btn.active { color: var(--purple2); }
.nb-btn.active .nb-dot { opacity: 1; }
.nb-icon { font-size: 22px; line-height: 1; transition: transform .2s; }
.nb-btn.active .nb-icon { transform: scale(1.1); }
.nb-label { font-size: 10px; font-weight: 500; letter-spacing: .03em; }
.nb-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--purple); position: absolute; top: 6px; opacity: 0; transition: opacity .2s; }

/* ── TOP BAR ── */
.topbar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
.topbar-title { font-size: 22px; font-weight: 700; letter-spacing: -.02em; }
.topbar-sub { font-size: 12px; color: var(--muted); margin-top: 2px; }
.chip { display: inline-flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 4px 10px; border-radius: 99px; font-family: var(--mono); }
.chip-purple { background: rgba(139,92,246,.18); color: var(--purple2); border: 1px solid var(--border2); }
.chip-green  { background: rgba(16,185,129,.15); color: var(--green); }
.chip-amber  { background: rgba(245,158,11,.15); color: var(--amber); }
.chip-red    { background: rgba(239,68,68,.15); color: var(--red); }
.chip-pink   { background: rgba(236,72,153,.15); color: var(--pink); }
.chip-cyan   { background: rgba(6,182,212,.15); color: var(--cyan); }

/* ── CARDS ── */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}
.card-glow { box-shadow: 0 0 28px rgba(139,92,246,.08); }
.card-title { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 14px; }

/* ── STAT TILES ── */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat-tile {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  position: relative; overflow: hidden;
}
.stat-tile::before {
  content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
  background: linear-gradient(90deg, var(--c1), var(--c2));
}
.stat-label { font-size: 10px; color: var(--muted); font-weight: 500; letter-spacing: .05em; text-transform: uppercase; margin-bottom: 6px; }
.stat-val { font-size: 28px; font-weight: 700; font-family: var(--mono); line-height: 1; }
.stat-sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

/* ── PROGRESS BAR ── */
.prog-wrap { height: 6px; background: var(--surface3); border-radius: 99px; overflow: hidden; }
.prog-fill { height: 100%; border-radius: 99px; transition: width .4s cubic-bezier(.4,0,.2,1); }

/* ── HABIT ROW ── */
.habit-row {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 0; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: opacity .15s;
}
.habit-row:last-child { border-bottom: none; padding-bottom: 0; }
.habit-row:active { opacity: .7; }
.h-icon { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.h-info { flex: 1; min-width: 0; }
.h-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.h-pl { font-size: 11px; color: var(--muted); margin-top: 1px; }
.h-check {
  width: 26px; height: 26px; border-radius: 8px;
  border: 2px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: all .2s; font-size: 13px; color: white;
}
.h-check.on { background: var(--green); border-color: var(--green); }

/* ── SECTION HEADER ── */
.sec-hdr { display: flex; align-items: center; justify-content: space-between; margin: 18px 0 10px; }
.sec-title { font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; }

/* ── BUTTONS ── */
.btn {
  font-family: var(--font); font-size: 13px; font-weight: 600;
  padding: 10px 18px; border-radius: 10px;
  border: 1px solid var(--border2); background: transparent;
  color: var(--text); cursor: pointer; transition: all .15s;
  display: inline-flex; align-items: center; gap: 6px;
}
.btn:active { transform: scale(.97); }
.btn-primary { background: var(--purple); border-color: var(--purple); color: white; }
.btn-primary:hover { background: var(--purple2); }
.btn-sm { font-size: 12px; padding: 7px 13px; border-radius: 8px; }
.btn-ghost { border-color: transparent; color: var(--muted); }
.btn-danger { color: var(--red); border-color: transparent; }
.btn-danger:hover { background: rgba(239,68,68,.1); }
.btn-full { width: 100%; justify-content: center; }

/* ── INPUTS ── */
.inp {
  font-family: var(--font); font-size: 14px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 10px; padding: 11px 14px;
  color: var(--text); outline: none; width: 100%;
  transition: border-color .15s;
}
.inp:focus { border-color: var(--purple); }
.inp-row { display: flex; gap: 8px; margin-bottom: 10px; }
.inp-row .inp { flex: 1; }
.lbl { font-size: 12px; font-weight: 500; color: var(--muted); margin-bottom: 6px; display: block; }
.form-group { margin-bottom: 14px; }

/* ── CHALLENGE CARD ── */
.chal-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 10px;
  position: relative; overflow: hidden;
  cursor: pointer; transition: border-color .2s;
}
.chal-card:active { opacity: .85; }
.chal-card-top { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 10px; }
.chal-icon-name { display: flex; align-items: center; gap: 10px; }
.chal-icon { font-size: 22px; }
.chal-name { font-size: 15px; font-weight: 600; }
.chal-dates { font-size: 11px; color: var(--muted); margin-top: 2px; }
.chal-dots { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 10px; }
.chal-dot {
  width: 10px; height: 10px; border-radius: 3px;
  background: var(--surface3); transition: background .2s;
  cursor: pointer;
}
.chal-dot.done { background: var(--green); }
.chal-dot.missed { background: rgba(239,68,68,.4); }
.chal-dot.today { outline: 2px solid var(--purple2); outline-offset: 1px; }

/* ── HISTORY ── */
.hist-day {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px 16px;
  margin-bottom: 8px;
  cursor: pointer; transition: border-color .2s;
}
.hist-day:active { border-color: var(--purple); }
.hist-day-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
.hist-date-lbl { font-size: 13px; font-weight: 600; }
.hist-score { font-size: 12px; font-family: var(--mono); color: var(--purple2); }
.hist-dots { display: flex; flex-wrap: wrap; gap: 4px; }
.hist-dot { width: 10px; height: 10px; border-radius: 3px; }

/* ── CALENDAR ── */
.cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 4px; }
.cal-hdr { font-size: 10px; color: var(--muted); text-align: center; padding: 4px 0; font-weight: 600; }
.cal-day {
  aspect-ratio: 1; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 500; font-family: var(--mono);
  cursor: pointer; transition: all .15s;
  border: 1px solid transparent;
}
.cal-day.empty { background: none; cursor: default; }
.cal-day.perfect { background: rgba(139,92,246,.3); color: var(--purple2); border-color: rgba(139,92,246,.4); }
.cal-day.good { background: rgba(16,185,129,.2); color: var(--green); }
.cal-day.partial { background: rgba(245,158,11,.15); color: var(--amber); }
.cal-day.missed { background: rgba(239,68,68,.1); color: rgba(239,68,68,.6); }
.cal-day.today { border-color: var(--purple); font-weight: 700; }
.cal-day.future { color: var(--muted2); }

/* ── MODAL ── */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,.7);
  backdrop-filter: blur(4px); z-index: 200;
  display: flex; align-items: flex-end; justify-content: center;
  opacity: 0; pointer-events: none; transition: opacity .25s;
}
.modal-overlay.open { opacity: 1; pointer-events: all; }
.modal {
  background: var(--bg2); border: 1px solid var(--border2);
  border-radius: 20px 20px 0 0;
  padding: 20px 20px calc(20px + env(safe-area-inset-bottom));
  width: 100%; max-height: 90vh; overflow-y: auto;
  transform: translateY(100%); transition: transform .3s cubic-bezier(.4,0,.2,1);
}
.modal-overlay.open .modal { transform: translateY(0); }
.modal-handle { width: 36px; height: 4px; background: var(--surface3); border-radius: 99px; margin: 0 auto 16px; }
.modal-title { font-size: 18px; font-weight: 700; margin-bottom: 18px; }

/* ── STREAK FLAME ── */
.streak-display { text-align: center; padding: 24px 0 16px; }
.streak-num { font-size: 64px; font-weight: 700; font-family: var(--mono); line-height: 1; background: linear-gradient(135deg, var(--purple2), var(--pink)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.streak-label { font-size: 14px; color: var(--muted); margin-top: 6px; }

/* ── EMPTY STATE ── */
.empty { text-align: center; padding: 40px 20px; color: var(--muted); }
.empty-icon { font-size: 40px; margin-bottom: 10px; }
.empty-text { font-size: 14px; }

/* ── PLAYLIST BADGE ── */
.pl-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 12px; padding: 5px 10px; border-radius: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  cursor: pointer; transition: all .15s; margin: 3px;
}
.pl-badge.active { background: rgba(139,92,246,.2); border-color: var(--purple); color: var(--purple2); }

/* ── COLOR SWATCHES ── */
.color-row { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 6px; }
.color-swatch { width: 28px; height: 28px; border-radius: 8px; cursor: pointer; border: 2px solid transparent; transition: border-color .15s; }
.color-swatch.selected { border-color: white; }

/* ── DIVIDER ── */
.divider { height: 1px; background: var(--border); margin: 16px 0; }

/* ── MANAGE ITEM ── */
.manage-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-bottom: 1px solid var(--border);
}
.manage-item:last-child { border-bottom: none; }
.manage-item-icon { width: 32px; height: 32px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
.manage-item-name { flex: 1; font-size: 14px; }

/* ── NAV MONTH ── */
.month-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
.month-nav-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 16px; }
.month-name { font-size: 15px; font-weight: 600; }

/* ── TODAY SCORE RING ── */
.score-ring-wrap { display: flex; align-items: center; gap: 16px; padding: 4px 0; }
.score-ring { position: relative; width: 70px; height: 70px; flex-shrink: 0; }
.score-ring svg { transform: rotate(-90deg); }
.score-ring-num { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: 700; font-family: var(--mono); }
.score-ring-info { flex: 1; }
.score-ring-title { font-size: 17px; font-weight: 700; }
.score-ring-sub { font-size: 12px; color: var(--muted); margin-top: 3px; }

/* ── GLOW PURPLE LINE ── */
.purple-line { height: 2px; background: linear-gradient(90deg, transparent, var(--purple), var(--pink), transparent); margin: 0 -16px 20px; opacity: .5; }

/* ── CHALLENGE CREATE FORM ── */
.duration-opts { display: flex; gap: 8px; margin-top: 6px; flex-wrap: wrap; }
.dur-btn { font-size: 12px; padding: 6px 14px; border-radius: 8px; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; transition: all .15s; font-family: var(--font); }
.dur-btn.active { background: rgba(139,92,246,.2); border-color: var(--purple); color: var(--purple2); }
</style>
</head>
<body>
<div id="app">
  <div id="content">

    <!-- ══ HOME PAGE ══ -->
    <div class="page active" id="page-home">
      <div class="topbar">
        <div>
          <div class="topbar-title" id="home-greeting">Good morning 👋</div>
          <div class="topbar-sub" id="home-date"></div>
        </div>
        <div class="chip chip-purple" id="home-streak-chip">🔥 0 days</div>
      </div>
      <div class="purple-line"></div>

      <!-- Score ring -->
      <div class="card card-glow" style="margin-bottom:12px">
        <div class="score-ring-wrap">
          <div class="score-ring">
            <svg width="70" height="70" viewBox="0 0 70 70">
              <circle cx="35" cy="35" r="28" fill="none" stroke="rgba(139,92,246,.15)" stroke-width="7"/>
              <circle id="score-ring-arc" cx="35" cy="35" r="28" fill="none" stroke="url(#ringGrad)" stroke-width="7" stroke-linecap="round" stroke-dasharray="175.9" stroke-dashoffset="175.9"/>
              <defs>
                <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#8b5cf6"/>
                  <stop offset="100%" stop-color="#ec4899"/>
                </linearGradient>
              </defs>
            </svg>
            <div class="score-ring-num" id="score-ring-num">0%</div>
          </div>
          <div class="score-ring-info">
            <div class="score-ring-title" id="score-ring-title">Start your day!</div>
            <div class="score-ring-sub" id="score-ring-sub">0 of 0 habits done</div>
            <div style="margin-top:8px">
              <div class="prog-wrap"><div class="prog-fill" id="home-prog" style="width:0%;background:linear-gradient(90deg,var(--purple),var(--pink))"></div></div>
            </div>
          </div>
        </div>
      </div>

      <!-- Stats -->
      <div class="stats-grid">
        <div class="stat-tile" style="--c1:var(--purple);--c2:var(--pink)">
          <div class="stat-label">Best Streak</div>
          <div class="stat-val" id="stat-best" style="color:var(--purple2)">0</div>
          <div class="stat-sub">days 🏆</div>
        </div>
        <div class="stat-tile" style="--c1:var(--cyan);--c2:var(--green)">
          <div class="stat-label">Total Days</div>
          <div class="stat-val" id="stat-total" style="color:var(--cyan)">0</div>
          <div class="stat-sub">logged</div>
        </div>
      </div>

      <!-- Today's habits preview -->
      <div class="sec-hdr">
        <div class="sec-title">Today's Habits</div>
        <button class="btn btn-ghost btn-sm" onclick="switchPage('today')">See all →</button>
      </div>
      <div class="card" id="home-habits-preview"></div>

      <!-- Active challenges -->
      <div class="sec-hdr">
        <div class="sec-title">Active Challenges</div>
        <button class="btn btn-ghost btn-sm" onclick="switchPage('challenges')">See all →</button>
      </div>
      <div id="home-challenges-preview"></div>
    </div>

    <!-- ══ TODAY PAGE ══ -->
    <div class="page" id="page-today">
      <div class="topbar">
        <div>
          <div class="topbar-title">Today</div>
          <div class="topbar-sub" id="today-date-lbl"></div>
        </div>
        <div id="today-score-chip" class="chip chip-purple">0 / 0</div>
      </div>
      <div class="purple-line"></div>

      <!-- Playlist filter -->
      <div style="margin-bottom:14px;display:flex;flex-wrap:wrap;gap:0" id="today-pl-filter"></div>

      <div id="today-habits-list"></div>

      <div style="display:flex;gap:8px;margin-top:8px;margin-bottom:4px">
        <button class="btn btn-sm" style="flex:1" onclick="markAllToday(true)">✓ Mark All Done</button>
        <button class="btn btn-sm btn-ghost" style="flex:1" onclick="markAllToday(false)">✕ Clear All</button>
      </div>
    </div>

    <!-- ══ CHALLENGES PAGE ══ -->
    <div class="page" id="page-challenges">
      <div class="topbar">
        <div>
          <div class="topbar-title">Challenges</div>
          <div class="topbar-sub">Track your streaks</div>
        </div>
        <button class="btn btn-primary btn-sm" onclick="openModal('modal-new-chal')">+ New</button>
      </div>
      <div class="purple-line"></div>
      <div id="challenges-list"></div>
    </div>

    <!-- ══ HISTORY PAGE ══ -->
    <div class="page" id="page-history">
      <div class="topbar">
        <div>
          <div class="topbar-title">History</div>
          <div class="topbar-sub" id="hist-month-lbl"></div>
        </div>
      </div>
      <div class="purple-line"></div>
      <div class="month-nav">
        <button class="month-nav-btn" onclick="histNav(-1)">‹</button>
        <div class="month-name" id="hist-nav-month"></div>
        <button class="month-nav-btn" onclick="histNav(1)">›</button>
      </div>
      <!-- Calendar -->
      <div class="card" style="margin-bottom:14px">
        <div class="cal-grid" id="cal-headers"></div>
        <div class="cal-grid" id="cal-days" style="margin-top:4px"></div>
      </div>
      <!-- Day list -->
      <div id="hist-days-list"></div>
    </div>

    <!-- ══ MANAGE PAGE ══ -->
    <div class="page" id="page-manage">
      <div class="topbar">
        <div class="topbar-title">Manage</div>
      </div>
      <div class="purple-line"></div>

      <!-- Playlists -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="sec-title" style="margin:0">Playlists</div>
        <button class="btn btn-primary btn-sm" onclick="openModal('modal-new-pl')">+ Playlist</button>
      </div>
      <div id="pl-list" class="card" style="margin-bottom:16px"></div>

      <!-- Challenges manage -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
        <div class="sec-title" style="margin:0">Challenges</div>
        <button class="btn btn-primary btn-sm" onclick="openModal('modal-new-chal')">+ Challenge</button>
      </div>
      <div id="chal-manage-list" class="card"></div>
    </div>

  </div><!-- /content -->

  <!-- ══ NAVBAR ══ -->
  <nav id="navbar">
    <button class="nb-btn active" id="nb-home" onclick="switchPage('home')">
      <div class="nb-dot"></div>
      <div class="nb-icon">🏠</div>
      <div class="nb-label">Home</div>
    </button>
    <button class="nb-btn" id="nb-today" onclick="switchPage('today')">
      <div class="nb-dot"></div>
      <div class="nb-icon">✅</div>
      <div class="nb-label">Today</div>
    </button>
    <button class="nb-btn" id="nb-challenges" onclick="switchPage('challenges')">

<script>
// ══════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════
const COLORS = ['#8b5cf6','#ec4899','#06b6d4','#10b981','#f59e0b','#ef4444','#a78bfa','#f97316'];

const DEFAULT_STATE = {
  playlists: [
    { id:'pl_morning', name:'Morning', icon:'☀️', habits:[
      { id:'h1', name:'Wake up 5am', color:'#f59e0b' },
      { id:'h2', name:'Cold shower', color:'#06b6d4' },
    ]},
    { id:'pl_grind', name:'Grind', icon:'⚡', habits:[
      { id:'h3', name:'DSA practice', color:'#8b5cf6' },
      { id:'h4', name:'Deep study 2hr', color:'#ec4899' },
    ]},
    { id:'pl_body', name:'Body', icon:'💪', habits:[
      { id:'h5', name:'Workout', color:'#10b981' },
      { id:'h6', name:'No junk food', color:'#f97316' },
    ]}
  ],
  challenges: [],
  days: {}
};

function loadState() {
  try { const r = localStorage.getItem('discipline365_v2'); if (r) return JSON.parse(r); } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_STATE));
}
function saveState() {
  try { localStorage.setItem('discipline365_v2', JSON.stringify(S)); } catch(e) {}
}
let S = loadState();

// ══════════════════════════════════════════
//  DATE UTILS
// ══════════════════════════════════════════
const _now = new Date();
function todayKey() {
  return `${_now.getFullYear()}-${String(_now.getMonth()+1).padStart(2,'0')}-${String(_now.getDate()).padStart(2,'0')}`;
}
function mkKey(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function keyToDate(k) { const[y,m,d]=k.split('-').map(Number); return new Date(y,m-1,d); }
function daysInMonth(y,m) { return new Date(y,m+1,0).getDate(); }
function addDays(dt,n) { const d=new Date(dt); d.setDate(d.getDate()+n); return d; }
function fmtDate(dt, opts) {
  return dt.toLocaleDateString('en-IN', opts || {weekday:'short',month:'short',day:'numeric'});
}

const TKEY = todayKey();

// ══════════════════════════════════════════
//  STATE HELPERS
// ══════════════════════════════════════════
function getAllHabits() { return S.playlists.flatMap(p => p.habits); }
function getPlaylistOfHabit(hId) { return S.playlists.find(p => p.habits.some(h => h.id === hId)); }

function ensureDay(k) {
  if (!S.days[k]) S.days[k] = { done: {}, streak: 0 };
  getAllHabits().forEach(h => { if (S.days[k].done[h.id] === undefined) S.days[k].done[h.id] = false; });
}

function getScore(k) {
  if (!S.days[k]) return { done: 0, total: 0 };
  const habits = getAllHabits();
  const done = habits.filter(h => S.days[k].done[h.id]).length;
  return { done, total: habits.length };
}

function recalcStreaks() {
  // Global streak
  let streak = 0, best = 0, cur = 0;
  const keys = Object.keys(S.days).sort();
  const today = new Date(TKEY);
  for (let i = 0; i < 365; i++) {
    const dt = new Date(today); dt.setDate(dt.getDate() - i);
    const k = mkKey(dt.getFullYear(), dt.getMonth(), dt.getDate());
    const sc = getScore(k);
    if (sc.total > 0 && sc.done === sc.total) { if (i === 0 || cur > 0) cur++; }
    else if (i > 0) { if (cur > best) best = cur; cur = 0; }
  }
  if (cur > best) best = cur;
  S.streak = cur;
  S.bestStreak = Math.max(S.bestStreak || 0, best);
}

// ══════════════════════════════════════════
//  NAVIGATION
// ══════════════════════════════════════════
let currentPage = 'home';
function switchPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nb-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  document.getElementById('nb-' + name).classList.add('active');
  document.getElementById('content').scrollTo(0, 0);
  currentPage = name;
  if (name === 'home') renderHome();
  if (name === 'today') renderToday();
  if (name === 'challenges') renderChallenges();
  if (name === 'history') renderHistory();
  if (name === 'manage') renderManage();
}

// ══════════════════════════════════════════
//  MODALS
// ══════════════════════════════════════════
function openModal(id) {
  document.getElementById(id).classList.add('open');
  if (id === 'modal-new-chal') initChalModal();
  if (id === 'modal-new-pl') { document.getElementById('np-name').value=''; document.getElementById('np-icon').value=''; }
}
function closeModal(id) { document.getElementById(id).classList.remove('open'); }
function closeModalOutside(e, id) { if (e.target.id === id) closeModal(id); }

function initChalModal() {
  const today = TKEY;
  document.getElementById('nc-name').value = '';
  document.getElementById('nc-icon').value = '';
  document.getElementById('nc-start').value = today;
  const end30 = addDays(new Date(today), 29);
  document.getElementById('nc-end').value = mkKey(end30.getFullYear(), end30.getMonth(), end30.getDate());
  // Duration buttons
  const durEl = document.getElementById('nc-durations');
  durEl.innerHTML = [7,21,30,66,90,365].map(d =>
    `<button class="dur-btn ${d===30?'active':''}" onclick="setDuration(${d},this)">${d} days</button>`
  ).join('');
  // Playlist select
  const sel = document.getElementById('nc-playlist');
  sel.innerHTML = '<option value="">— Standalone —</option>' + S.playlists.map(p =>
    `<option value="${p.id}">${p.icon} ${p.name}</option>`
  ).join('');
}

function setDuration(days, btn) {
  document.querySelectorAll('.dur-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const start = new Date(document.getElementById('nc-start').value || TKEY);
  const end = addDays(start, days - 1);
  document.getElementById('nc-end').value = mkKey(end.getFullYear(), end.getMonth(), end.getDate());
}

// ══════════════════════════════════════════
//  HOME
// ══════════════════════════════════════════
function renderHome() {
  // Greeting
  const h = _now.getHours();
  const greet = h < 12 ? 'Good morning 👋' : h < 17 ? 'Good afternoon 👋' : 'Good evening 👋';
  document.getElementById('home-greeting').textContent = greet;
  document.getElementById('home-date').textContent = fmtDate(_now, {weekday:'long',month:'long',day:'numeric'});

  ensureDay(TKEY);
  recalcStreaks();
  const sc = getScore(TKEY);
  const pct = sc.total ? Math.round(sc.done / sc.total * 100) : 0;

  // Streak chip
  document.getElementById('home-streak-chip').textContent = `🔥 ${S.streak || 0} days`;

  // Score ring
  const circ = 175.9;
  const offset = circ - (circ * pct / 100);
  document.getElementById('score-ring-arc').style.strokeDashoffset = offset;
  document.getElementById('score-ring-num').textContent = pct + '%';
  document.getElementById('score-ring-title').textContent = pct === 100 ? 'Perfect day! 🎉' : pct > 50 ? 'Great progress!' : sc.done > 0 ? 'Keep going!' : 'Start your day!';
  document.getElementById('score-ring-sub').textContent = `${sc.done} of ${sc.total} habits done`;
  document.getElementById('home-prog').style.width = pct + '%';

  // Stats
  document.getElementById('stat-best').textContent = S.bestStreak || 0;
  document.getElementById('stat-total').textContent = Object.keys(S.days).length;

  // Habits preview (first 4)
  const habits = getAllHabits().slice(0, 4);
  const previewEl = document.getElementById('home-habits-preview');
  if (!habits.length) {
    previewEl.innerHTML = `<div class="empty"><div class="empty-icon">📝</div><div class="empty-text">No habits yet.<br>Add some in Manage!</div></div>`;
  } else {
    previewEl.innerHTML = habits.map(h => habitRowHTML(h, TKEY, true)).join('');
  }

  // Active challenges preview
  const chalEl = document.getElementById('home-challenges-preview');
  const today = new Date(TKEY);
  const active = S.challenges.filter(c => new Date(c.start) <= today && new Date(c.end) >= today);
  if (!active.length) {
    chalEl.innerHTML = `<div class="card"><div class="empty" style="padding:20px 0"><div class="empty-icon">🎯</div><div class="empty-text">No active challenges.<br><button class="btn btn-primary btn-sm" style="margin-top:8px" onclick="switchPage('challenges')">Create one!</button></div></div></div>`;
  } else {
    chalEl.innerHTML = active.slice(0,2).map(c => miniChalHTML(c)).join('');
  }
}

function habitRowHTML(h, k, mini) {
  const done = S.days[k]?.done[h.id];
  const pl = getPlaylistOfHabit(h.id);
  return `<div class="habit-row" onclick="toggleHabit('${h.id}','${k}')">
    <div class="h-icon" style="background:${h.color}22;color:${h.color}">${pl?.icon||'•'}</div>
    <div class="h-info">
      <div class="h-name" style="${done?'text-decoration:line-through;color:var(--muted)':''}">${h.name}</div>
      ${!mini ? `<div class="h-pl">${pl?.name||''}</div>` : ''}
    </div>
    <div class="h-check ${done?'on':''}">${done?'✓':''}</div>
  </div>`;
}

function miniChalHTML(c) {
  const start = new Date(c.start), end = new Date(c.end);
  const today = new Date(TKEY);
  const total = Math.round((end - start) / 864e5) + 1;
  const elapsed = Math.min(Math.round((today - start) / 864e5) + 1, total);
  let done = 0;
  for (let i = 0; i < elapsed; i++) {
    const dt = addDays(start, i);
    const k = mkKey(dt.getFullYear(), dt.getMonth(), dt.getDate());
    if (S.days[k]?.done[c.id]) done++;
  }
  const pct = elapsed > 0 ? Math.round(done / elapsed * 100) : 0;
  return `<div class="chal-card" onclick="openChalDetail('${c.id}')">
    <div class="chal-card-top">
      <div class="chal-icon-name">
        <div class="chal-icon">${c.icon||'🎯'}</div>
        <div><div class="chal-name">${c.name}</div><div class="chal-dates">Day ${elapsed}/${total}</div></div>
      </div>
      <span class="chip chip-purple" style="font-size:12px">${pct}%</span>
    </div>
    <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%;background:${c.color}"></div></div>
  </div>`;
}

// ══════════════════════════════════════════
//  TODAY
// ══════════════════════════════════════════
let todayPl = 'all';
function renderToday() {
  ensureDay(TKEY);
  document.getElementById('today-date-lbl').textContent = fmtDate(_now, {weekday:'long',month:'long',day:'numeric'});

  const sc = getScore(TKEY);
  document.getElementById('today-score-chip').textContent = `${sc.done} / ${sc.total}`;

  // Playlist filter
  const filterEl = document.getElementById('today-pl-filter');
  filterEl.innerHTML = `<button class="pl-badge ${todayPl==='all'?'active':''}" onclick="setTodayPl('all')">All</button>` +
    S.playlists.map(p => `<button class="pl-badge ${todayPl===p.id?'active':''}" onclick="setTodayPl('${p.id}')">${p.icon} ${p.name}</button>`).join('');

  // Habits
  const listEl = document.getElementById('today-habits-list');
  const habits = todayPl === 'all' ? getAllHabits() : (S.playlists.find(p=>p.id===todayPl)?.habits||[]);
  if (!habits.length) {
    listEl.innerHTML = `<div class="card"><div class="empty"><div class="empty-icon">📝</div><div class="empty-text">No habits here.<br>Add some in Manage!</div></div></div>`;
    return;
  }
  // Group by playlist
  if (todayPl === 'all') {
    listEl.innerHTML = S.playlists.filter(p => p.habits.length > 0).map(p => {
      const done = p.habits.filter(h => S.days[TKEY]?.done[h.id]).length;
      return `<div style="margin-bottom:4px">
        <div class="sec-hdr" style="margin-top:0;margin-bottom:6px">
          <div style="display:flex;align-items:center;gap:6px">
            <span>${p.icon}</span>
            <span class="sec-title" style="margin:0">${p.name}</span>
          </div>
          <span class="chip chip-purple" style="font-size:11px">${done}/${p.habits.length}</span>
        </div>
        <div class="card" style="margin-bottom:8px">${p.habits.map(h => habitRowHTML(h, TKEY, false)).join('')}</div>
      </div>`;
    }).join('');
  } else {
    listEl.innerHTML = `<div class="card">${habits.map(h => habitRowHTML(h, TKEY, false)).join('')}</div>`;
  }
}

function setTodayPl(plId) { todayPl = plId; renderToday(); }

function toggleHabit(hId, k) {
  ensureDay(k);
  S.days[k].done[hId] = !S.days[k].done[hId];
  recalcStreaks(); saveState();
  if (currentPage === 'today') renderToday();
  if (currentPage === 'home') renderHome();
}

function markAllToday(v) {
  ensureDay(TKEY);
  getAllHabits().forEach(h => S.days[TKEY].done[h.id] = v);
  recalcStreaks(); saveState(); renderToday();
}

// ══════════════════════════════════════════
//  CHALLENGES
// ══════════════════════════════════════════
function renderChallenges() {
  const el = document.getElementById('challenges-list');
  if (!S.challenges.length) {
    el.innerHTML = `<div class="empty" style="padding:60px 0"><div class="empty-icon">🔥</div><div class="empty-text">No challenges yet.<br>Start your first one!</div></div>`;
    return;
  }
  const today = new Date(TKEY);
  el.innerHTML = S.challenges.map(c => {
    const start = new Date(c.start), end = new Date(c.end);
    const active = start <= today && end >= today;
    const total = Math.round((end - start) / 864e5) + 1;
    const elapsed = Math.min(Math.max(Math.round((today - start) / 864e5) + 1, 0), total);
    let done = 0;
    for (let i = 0; i < elapsed; i++) {
      const dt = addDays(start, i);
      const k = mkKey(dt.getFullYear(), dt.getMonth(), dt.getDate());
      if (S.days[k]?.done[c.id]) done++;
    }
    const pct = elapsed > 0 ? Math.round(done / elapsed * 100) : 0;
    const todayDone = S.days[TKEY]?.done[c.id];
    return `<div class="chal-card" style="border-color:${c.color}33" onclick="openChalDetail('${c.id}')">
      <div style="position:absolute;top:0;left:0;right:0;height:2px;background:${c.color}"></div>
      <div class="chal-card-top">
        <div class="chal-icon-name">
          <div class="chal-icon">${c.icon||'🎯'}</div>
          <div>
            <div class="chal-name">${c.name}</div>
            <div class="chal-dates">${c.start} → ${c.end}</div>
          </div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px">
          ${active ? `<span class="chip chip-pink" style="font-size:10px">LIVE</span>` : ''}
          <span style="font-size:13px;font-weight:700;font-family:var(--mono);color:${c.color}">${pct}%</span>
        </div>
      </div>
      <div style="font-size:12px;color:var(--muted);margin-bottom:8px">Day ${elapsed} of ${total} · ${done}/${elapsed} done</div>
      <div class="prog-wrap"><div class="prog-fill" style="width:${pct}%;background:${c.color}"></div></div>
      ${active ? `<div style="margin-top:10px;display:flex;align-items:center;gap:8px">
        <div class="h-check ${todayDone?'on':''}" style="width:30px;height:30px" onclick="event.stopPropagation();toggleChalDay('${c.id}',TKEY)">${todayDone?'✓':''}</div>
        <span style="font-size:13px;color:var(--muted)">Today's check-in</span>
      </div>` : ''}
    </div>`;
  }).join('');
}

function toggleChalDay(cId, k) {
  if (!S.days[k]) S.days[k] = { done: {}, streak: 0 };
  S.days[k].done[cId] = !S.days[k].done[cId];
  recalcStreaks(); saveState();
  if (currentPage === 'challenges') renderChallenges();
}

function openChalDetail(cId) {
  const c = S.challenges.find(ch => ch.id === cId);
  if (!c) return;
  const start = new Date(c.start), end = new Date(c.end);
  const today = new Date(TKEY);
  const total = Math.round((end - start) / 864e5) + 1;
  const elapsed = Math.min(Math.max(Math.round((today - start) / 864e5) + 1, 0), total);
  let done = 0;
  const dots = [];
  for (let i = 0; i < total; i++) {
    const dt = addDays(start, i);
    const k = mkKey(dt.getFullYear(), dt.getMonth(), dt.getDate());
    const isPast = dt < today, isToday = k === TKEY;
    const d = S.days[k]?.done[cId];
    if ((isPast || isToday) && d) done++;
    let cls = 'chal-dot';
    if (isPast || isToday) cls += d ? ' done' : ' missed';
    if (isToday) cls += ' today';
    dots.push(`<div class="${cls}" onclick="toggleChalDayDetail('${cId}','${k}')" title="${k}"></div>`);
  }
  const pct = elapsed > 0 ? Math.round(done / elapsed * 100) : 0;
  document.getElementById('modal-chal-detail-body').innerHTML = `
    <div class="modal-handle"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
      <div style="font-size:22px;font-weight:700">${c.icon||'🎯'} ${c.name}</div>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('modal-chal-detail')">✕</button>
    </div>
    <div style="font-size:12px;color:var(--muted);margin-bottom:16px">${c.start} → ${c.end} · ${total} days</div>
    <div class="streak-display" style="padding:16px 0 12px">
      <div class="streak-num" style="background:linear-gradient(135deg,${c.color},var(--pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${pct}%</div>
      <div class="streak-label">Day ${elapsed} of ${total} · ${done} done</div>
    </div>
    <div class="prog-wrap" style="margin-bottom:16px"><div class="prog-fill" style="width:${pct}%;background:${c.color}"></div></div>
    <div class="card-title">Progress dots (tap to toggle)</div>
    <div class="chal-dots">${dots.join('')}</div>
    <div style="font-size:11px;color:var(--muted);margin-top:8px;margin-bottom:16px">🟢 Done &nbsp; 🔴 Missed &nbsp; ⬛ Future</div>
    <button class="btn btn-danger btn-sm" onclick="deleteChallenge('${cId}');closeModal('modal-chal-detail')">Delete Challenge</button>
  `;
  openModal('modal-chal-detail');
}

function toggleChalDayDetail(cId, k) {
  if (!S.days[k]) S.days[k] = { done: {}, streak: 0 };
  S.days[k].done[cId] = !S.days[k].done[cId];
  recalcStreaks(); saveState();
  openChalDetail(cId);
}

// ══════════════════════════════════════════
//  HISTORY
// ══════════════════════════════════════════
let histYear = _now.getFullYear(), histMon = _now.getMonth();
function histNav(d) {
  histMon += d;
  if (histMon < 0) { histMon = 11; histYear--; }
  if (histMon > 11) { histMon = 0; histYear++; }
  renderHistory();
}

function renderHistory() {
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('hist-month-lbl').textContent = `${monthNames[histMon]} ${histYear}`;
  document.getElementById('hist-nav-month').textContent = `${monthNames[histMon]} ${histYear}`;

  // Calendar headers
  const days7 = ['Su','Mo','Tu','We','Th','Fr','Sa'];
  document.getElementById('cal-headers').innerHTML = days7.map(d => `<div class="cal-hdr">${d}</div>`).join('');

  const firstDay = new Date(histYear, histMon, 1).getDay();
  const total = daysInMonth(histYear, histMon);
  const todayFull = TKEY;
  const habits = getAllHabits();

  let calHTML = '';
  for (let i = 0; i < firstDay; i++) calHTML += '<div class="cal-day empty"></div>';
  for (let d = 1; d <= total; d++) {
    const k = mkKey(histYear, histMon, d);
    const sc = getScore(k);
    const isFuture = k > todayFull, isToday = k === todayFull;
    let cls = 'cal-day';
    if (isFuture) cls += ' future';
    else if (!sc.total) cls += ' future';
    else if (sc.done === sc.total) cls += ' perfect';
    else if (sc.done >= sc.total * 0.7) cls += ' good';
    else if (sc.done > 0) cls += ' partial';
    else cls += ' missed';
    if (isToday) cls += ' today';
    calHTML += `<div class="${cls}" onclick="calDayClick(${d})">${d}</div>`;
  }
  document.getElementById('cal-days').innerHTML = calHTML;

  // Day list
  const listEl = document.getElementById('hist-days-list');
  const keys = [];
  for (let d = total; d >= 1; d--) {
    const k = mkKey(histYear, histMon, d);
    if (k <= todayFull && S.days[k]) keys.push(k);
  }
  if (!keys.length) {
    listEl.innerHTML = `<div class="empty"><div class="empty-icon">📭</div><div class="empty-text">No data for this month</div></div>`;
    return;
  }
  listEl.innerHTML = keys.map(k => {
    const sc = getScore(k);
    const dt = keyToDate(k);
    const dots = getAllHabits().map(h => {
      const done = S.days[k]?.done[h.id];
      return `<div class="hist-dot" style="background:${done ? h.color : 'var(--surface3)'}"></div>`;
    }).join('');
    const pct = sc.total ? Math.round(sc.done/sc.total*100) : 0;
    return `<div class="hist-day">
      <div class="hist-day-top">
        <div class="hist-date-lbl">${fmtDate(dt)}</div>
        <span class="hist-score">${sc.done}/${sc.total} · ${pct}%</span>
      </div>
      <div class="hist-dots">${dots}</div>
    </div>`;
  }).join('');
}

function calDayClick(d) {
  const k = mkKey(histYear, histMon, d);
  if (k > TKEY) return;
  // scroll to day in list
  ensureDay(k);
  renderHistory();
}

// ══════════════════════════════════════════
//  MANAGE
// ══════════════════════════════════════════
function renderManage() {
  // Playlists
  const plEl = document.getElementById('pl-list');
  if (!S.playlists.length) {
    plEl.innerHTML = `<div class="empty" style="padding:20px 0"><div class="empty-text">No playlists yet</div></div>`;
  } else {
    plEl.innerHTML = S.playlists.map(p => `
      <div class="manage-item">
        <div class="manage-item-icon" style="background:var(--surface2)">${p.icon}</div>
        <div class="manage-item-name">${p.name} <span style="color:var(--muted);font-size:12px">(${p.habits.length} habits)</span></div>
        <button class="btn btn-sm btn-ghost" onclick="openPlDetail('${p.id}')">Edit</button>
        <button class="btn btn-sm btn-danger" onclick="deletePlaylist('${p.id}')">✕</button>
      </div>
    `).join('');
  }

  // Challenges manage
  const chEl = document.getElementById('chal-manage-list');
  if (!S.challenges.length) {
    chEl.innerHTML = `<div class="empty" style="padding:20px 0"><div class="empty-text">No challenges yet</div></div>`;
  } else {
    chEl.innerHTML = S.challenges.map(c => `
      <div class="manage-item">
        <div class="manage-item-icon" style="background:${c.color}22">${c.icon||'🎯'}</div>
        <div class="manage-item-name">${c.name} <span style="color:var(--muted);font-size:12px">(${c.start})</span></div>
        <button class="btn btn-sm btn-danger" onclick="deleteChallenge('${c.id}')">✕</button>
      </div>
    `).join('');
  }
}

function openPlDetail(plId) {
  const pl = S.playlists.find(p => p.id === plId);
  if (!pl) return;
  document.getElementById('add-habit-title').textContent = `Add to ${pl.icon} ${pl.name}`;
  document.getElementById('ah-pl-id').value = plId;
  document.getElementById('ah-name').value = '';
  // Color swatches
  const sw = document.getElementById('ah-colors');
  sw.innerHTML = COLORS.map(c => `<div class="color-swatch ${c===document.getElementById('ah-color').value?'selected':''}" style="background:${c}" onclick="selectColor('${c}',this)"></div>`).join('');

  document.getElementById('modal-pl-detail-body').innerHTML = `
    <div class="modal-handle"></div>
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div style="font-size:20px;font-weight:700">${pl.icon} ${pl.name}</div>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('modal-pl-detail')">✕</button>
    </div>
    <div class="card-title">Habits (${pl.habits.length})</div>
    <div id="pl-detail-habits" style="margin-bottom:16px">
      ${pl.habits.length ? pl.habits.map(h => `
        <div class="manage-item">
          <div class="manage-item-icon" style="background:${h.color}22;color:${h.color}">•</div>
          <div class="manage-item-name">${h.name}</div>
          <button class="btn btn-sm btn-danger" onclick="deleteHabit('${plId}','${h.id}');openPlDetail('${plId}')">✕</button>
        </div>
      `).join('') : '<div style="color:var(--muted);font-size:13px;padding:8px 0">No habits yet</div>'}
    </div>
    <div class="divider"></div>
    <div class="card-title" style="margin-bottom:10px">Add New Habit</div>
    <div class="form-group">
      <input class="inp" id="ah-name" placeholder="Habit name" maxlength="40">
    </div>
    <div class="form-group">
      <label class="lbl">Color</label>
      <div class="color-row">${COLORS.map(c => `<div class="color-swatch" style="background:${c}" onclick="selectColor('${c}',this)"></div>`).join('')}</div>
    </div>
    <input type="hidden" id="ah-pl-id" value="${plId}">
    <input type="hidden" id="ah-color" value="${COLORS[0]}">
    <button class="btn btn-primary btn-full" onclick="addHabit()">Add Habit</button>
  `;
  // Select first color
  document.querySelector('#modal-pl-detail-body .color-swatch').classList.add('selected');
  openModal('modal-pl-detail');
}

function selectColor(c, el) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('ah-color').value = c;
}

// ══════════════════════════════════════════
//  CRUD
// ══════════════════════════════════════════
function addPlaylist() {
  const name = document.getElementById('np-name').value.trim();
  const icon = document.getElementById('np-icon').value.trim() || '📋';
  if (!name) { document.getElementById('np-name').focus(); return; }
  S.playlists.push({ id: 'pl_' + Date.now(), name, icon, habits: [] });
  saveState(); closeModal('modal-new-pl'); renderManage();
}

function deletePlaylist(plId) {
  if (!confirm('Delete this playlist and all its habits?')) return;
  S.playlists = S.playlists.filter(p => p.id !== plId);
  saveState(); renderManage();
}

function addHabit() {
  const name = document.getElementById('ah-name').value.trim();
  const plId = document.getElementById('ah-pl-id').value;
  const color = document.getElementById('ah-color').value || COLORS[0];
  if (!name) return;
  const pl = S.playlists.find(p => p.id === plId);
  if (!pl) return;
  const h = { id: 'h_' + Date.now(), name, color };
  pl.habits.push(h);
  Object.keys(S.days).forEach(k => { if (S.days[k].done[h.id] === undefined) S.days[k].done[h.id] = false; });
  saveState();
  openPlDetail(plId);
}

function deleteHabit(plId, hId) {
  const pl = S.playlists.find(p => p.id === plId);
  if (pl) pl.habits = pl.habits.filter(h => h.id !== hId);
  recalcStreaks(); saveState();
}

function addChallenge() {
  const name = document.getElementById('nc-name').value.trim();
  const icon = document.getElementById('nc-icon').value.trim() || '🔥';
  const color = document.getElementById('nc-color').value;
  const start = document.getElementById('nc-start').value;
  const end = document.getElementById('nc-end').value;
  const plId = document.getElementById('nc-playlist').value;
  if (!name || !start || !end) { alert('Fill name, start and end date!'); return; }
  if (start > end) { alert('Start must be before end!'); return; }
  const c = { id: 'chal_' + Date.now(), name, icon, color, start, end, playlistId: plId };
  S.challenges.push(c);
  saveState(); closeModal('modal-new-chal');
  switchPage('challenges');
}

function deleteChallenge(cId) {
  if (!confirm('Delete this challenge?')) return;
  S.challenges = S.challenges.filter(c => c.id !== cId);
  saveState(); renderManage(); renderChallenges();
}

// ══════════════════════════════════════════
//  BOOT
// ══════════════════════════════════════════
ensureDay(TKEY);
recalcStreaks();
renderHome();

if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('./sw.js').catch(() => {});
}
</script>
